<!DOCTYPE html>
<html data-theme="<!--META-THEME-->">
  <head>
    <meta charset="utf-8" />
    <title><!--META-TITLE--></title>
    <meta
      name="description"
      content="Lupine Image Editor - Powered by Lupine.js, The Lightweight Frontend & Efficient Backend. 7kb gzipped, React TSX syntax, SSR, Page Router, and CSS-in-JS. Build faster with less overhead."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://uuware.github.io/lupine-template-responsive-starter/" />
    <meta property="og:title" content="Lupine Template Responsive Starter （Powered by Lupine.js）" />
    <meta property="og:description" content="Lupine Template Responsive Starter （Powered by Lupine.js）" />
    <meta
      property="og:image"
      content="https://uuware.github.io/lupine-template-responsive-starter/assets/og-image.png?v=2"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://uuware.github.io/lupine-template-responsive-starter/" />
    <meta property="twitter:title" content="Lupine Template Responsive Starter （Powered by Lupine.js）" />
    <meta property="twitter:description" content="Lupine Template Responsive Starter （Powered by Lupine.js）" />
    <meta
      property="twitter:image"
      content="https://uuware.github.io/lupine-template-responsive-starter/assets/og-image.png"
    />

    <link rel="icon" type="image/x-icon" href="{SUBDIR}/assets/favicon.ico" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--META-ENV-START-->
    <!--META-ENV-END-->
    <link rel="shortcut icon" href="{SUBDIR}/assets/favicon.ico?t={hash}" type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="{SUBDIR}/index.css?t={hash}" />
    <script defer src="{SUBDIR}/index.js#t={hash}"></script>
    <!-- Remove Cloudflare Web Analytics if you clone this project -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "07a9e51dc39a45948a6728b6fefe8eef"}'
    ></script>
    <!-- End Cloudflare Web Analytics -->
  </head>
  <body>
    <div class="lupine-root"></div>
  </body>
</html>
